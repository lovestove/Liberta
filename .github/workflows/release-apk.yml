name: Liberta APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Verify libbox runtime
        run: test -f app/libs/libbox.aar

      - name: Test and build APK
        run: gradle testDebugUnitTest :app:assembleDebug

      - name: Prepare release asset
        run: cp app/build/outputs/apk/debug/app-debug.apk liberta.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: liberta.apk
          fail_on_unmatched_files: true
